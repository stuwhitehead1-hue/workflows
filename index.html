<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endpoint Status Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000; /* 👇 Changed background to pure black */
            margin: 0;
        }
        .card {
            background: #121212; /* Darkened the card container for dark mode */
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #2d3748; /* Dark border to match the dark aesthetic */
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 300px;
        }
        h1 { margin-bottom: 5px; color: #ffffff; font-size: 1.5rem; } /* White text for the title */
        .status-badge {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 1.1rem;
        }
        /* Adjusted the green and red badge colors slightly to be more vibrant on dark UI */
        .online { background-color: #1c4ed8; color: #ffffff; } /* Alternative sleek dark option, or stick to vibrant green below */
        .online { background-color: #064e3b; color: #34d399; } /* Dark vibrant green */
        .offline { background-color: #7f1d1d; color: #f87171; } /* Dark vibrant red */
        .timestamp { font-size: 0.8rem; color: #a0aec0; } /* Light grey timestamp text */
    </style>
</head>
<body>

<div class="card">
    <h1 id="endpoint-name">Loading...</h1>
    <div id="status-display" class="status-badge">Checking...</div>
    <div class="timestamp">Last updated: <span id="time-display">-</span></div>
</div>

<script>
    // Fetch the JSON with a cache-buster (?t=...) to force fresh data every time
    fetch('./status.json?t=' + new Date().getTime())
        .then(response => response.json())
        .then(data => {
            document.getElementById('endpoint-name').innerText = data.endpoint;
            
            const badge = document.getElementById('status-display');
            if (data.online) {
                badge.innerText = "Online";
                badge.className = "status-badge online";
            } else {
                badge.innerText = "Offline";
                badge.className = "status-badge offline";
            }
            
            // Format UTC timestamp to local time
            const localTime = new Date(data.updated_at).toLocaleString();
            document.getElementById('time-display').innerText = localTime;
        })
        .catch(err => {
            console.error('Error fetching status:', err);
            document.getElementById('status-display').innerText = "Error";
            document.getElementById('status-display').className = "status-badge offline";
        });
</script>

</body>
</html>
