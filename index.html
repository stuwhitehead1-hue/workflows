<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endpoint Status Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f9;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 300px;
        }
        h1 { margin-bottom: 5px; color: #333; font-size: 1.5rem; }
        .status-badge {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 1.1rem;
        }
        .online { background-color: #d4edda; color: #155724; }
        .offline { background-color: #f8d7da; color: #721c24; }
        .timestamp { font-size: 0.8rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="endpoint-name">Loading...</h1>
    <div id="status-display" class="status-badge">Checking...</div>
    <div class="timestamp">Last updated: <span id="time-display">-</span></div>
</div>

<script>
    // Fetch the JSON generated by our GitHub Action
    fetch('./status.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('endpoint-name').innerText = data.endpoint;
            
            const badge = document.getElementById('status-display');
            if (data.online) {
                badge.innerText = "Online";
                badge.className = "status-badge online";
            } else {
                badge.innerText = "Offline";
                badge.className = "status-badge offline";
            }
            
            // Format UTC timestamp to local time
            const localTime = new Date(data.updated_at).toLocaleString();
            document.getElementById('time-display').innerText = localTime;
        })
        .catch(err => {
            console.error('Error fetching status:', err);
            document.getElementById('status-display').innerText = "Error";
            document.getElementById('status-display').className = "status-badge offline";
        });
    
    // Fetch the JSON with a cache-buster (?t=...) to force fresh data every time
fetch('./status.json?t=' + new Date().getTime())
    .then(response => response.json())
    .then(data => {
        document.getElementById('endpoint-name').innerText = data.endpoint;
        
        const badge = document.getElementById('status-display');
        if (data.online) {
            badge.innerText = "Online";
            badge.className = "status-badge online";
        } else {
            badge.innerText = "Offline";
            badge.className = "status-badge offline";
        }
        
        // Format UTC timestamp to local time
        const localTime = new Date(data.updated_at).toLocaleString();
        document.getElementById('time-display').innerText = localTime;
    })
    .catch(err => {
        console.error('Error fetching status:', err);
        document.getElementById('status-display').innerText = "Error";
        document.getElementById('status-display').className = "status-badge offline";
    });
</script>

</body>
</html>
