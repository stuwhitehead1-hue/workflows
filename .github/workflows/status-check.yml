name: Check Action1 Endpoint Status

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read
  pages: write      # 👇 Required to deploy directly to Pages
  id-token: write   # 👇 Required for secure deployment authentication

# Allow only one concurrent deployment, skipping runs time-outs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-status:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch Endpoint Status from Action1
        env:
          ACTION1_CLIENT_ID: ${{ secrets.ACTION1_CLIENT_ID }}
          ACTION1_CLIENT_SECRET: ${{ secrets.ACTION1_CLIENT_SECRET }}
          ACTION1_ORG_ID: ${{ secrets.ACTION1_ORG_ID }}
          ENDPOINT_NAME: "CPE-Control-PC"
        run: |
          # 1. Authenticate using your exact EU cluster URL and payload structure
          TOKEN=$(curl -s -X POST "https://app.eu.action1.com/api/3.0/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$ACTION1_CLIENT_ID&client_secret=$ACTION1_CLIENT_SECRET" \
            | jq -r '.access_token')
            
          # 2. Query EU cluster endpoints utilizing your Org ID
          STATUS_DATA=$(curl -s -X GET "https://app.eu.action1.com/api/3.0/endpoints/managed/$ACTION1_ORG_ID?fields=*" \
            -H "Authorization: Bearer $TOKEN")

          # 3. Check if the endpoint name matches and status is connected
          IS_ONLINE=$(echo "$STATUS_DATA" | jq --arg name "$ENDPOINT_NAME" '
            if .items then 
              [ .items[] | select(.name | ascii_downcase | contains($name | ascii_downcase)) | .status | ascii_downcase == "connected" ] | any
            else 
              false 
            end')

          # 4. Fallback in case evaluation returned null or empty
          if [ "$IS_ONLINE" = "null" ] || [ -z "$IS_ONLINE" ]; then
            IS_ONLINE=false
          fi

          # 5. Write out the clean JSON file for your HTML page
          echo "{\"endpoint\": \"$ENDPOINT_NAME\", \"online\": $IS_ONLINE, \"updated_at\": \"$(date -u -Iseconds)\"}" > status.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload website files
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository directory (which contains index.html and our newly generated status.json)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
