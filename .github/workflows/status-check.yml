name: Check Action1 Endpoint Status

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetches full history so branches match cleanly

      - name: Fetch Endpoint Status from Action1
        env:
          ACTION1_CLIENT_ID: ${{ secrets.ACTION1_CLIENT_ID }}
          ACTION1_CLIENT_SECRET: ${{ secrets.ACTION1_CLIENT_SECRET }}
          ACTION1_ORG_ID: ${{ secrets.ACTION1_ORG_ID }}
          ENDPOINT_NAME: "CPE-Control-PC"
        run: |
          # 1. Authenticate using your exact EU cluster URL and payload structure
          TOKEN=$(curl -s -X POST "https://app.eu.action1.com/api/3.0/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$ACTION1_CLIENT_ID&client_secret=$ACTION1_CLIENT_SECRET" \
            | jq -r '.access_token')
            
          # 2. Query EU cluster endpoints utilizing your Org ID
          STATUS_DATA=$(curl -s -X GET "https://app.eu.action1.com/api/3.0/endpoints/managed/$ACTION1_ORG_ID?fields=*" \
            -H "Authorization: Bearer $TOKEN")

          # 3. Check if the endpoint name matches and status is connected (case-insensitive)
          IS_ONLINE=$(echo "$STATUS_DATA" | jq --arg name "$ENDPOINT_NAME" '
            if .items then 
              [ .items[] | select(.name | ascii_downcase | contains($name | ascii_downcase)) | .status | ascii_downcase == "connected" ] | any
            else 
              false 
            end')

          # 4. Fallback in case evaluation returned null or empty
          if [ "$IS_ONLINE" = "null" ] || [ -z "$IS_ONLINE" ]; then
            IS_ONLINE=false
          fi

          # 5. Write out the clean JSON file for your HTML page
          echo "{\"endpoint\": \"$ENDPOINT_NAME\", \"online\": $IS_ONLINE, \"updated_at\": \"$(date -u -Iseconds)\"}" > status.json

      - name: Commit and Push Status
        run: |
          # Guarantee we are working directly on the remote tracking branch
          git checkout main || git checkout -b main
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the freshly changed json file
          git add status.json
          
          # Force a commit using a dynamically updating epoch timestamp in the commit message.
          # If Git acts stubborn and says nothing changed, the fallback rule appends an 
          # invisible whitespace to force a hash difference.
          if ! git commit -m "Automated status update (Timestamp: $(date +%s))"; then
            echo " " >> status.json
            git add status.json
            git commit -m "Automated status update (Forced change)"
          fi
          
          # Pull down any overlapping remote changes safely using rebase
          git pull --rebase origin main
          
          # Push directly back to your repository's live files
          git push origin main
