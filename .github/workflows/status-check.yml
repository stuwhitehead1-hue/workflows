name: Check Action1 Endpoint Status

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch Endpoint Status from Action1
        env:
          ACTION1_CLIENT_ID: ${{ secrets.ACTION1_CLIENT_ID }}
          ACTION1_CLIENT_SECRET: ${{ secrets.ACTION1_CLIENT_SECRET }}
          ACTION1_ORG_ID: ${{ secrets.ACTION1_ORG_ID }}
          ENDPOINT_NAME: "CPE-Control-PC"
        run: |
          # 1. Authenticate using your exact EU cluster URL and payload structure
          TOKEN=$(curl -s -X POST "https://app.eu.action1.com/api/3.0/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$ACTION1_CLIENT_ID&client_secret=$ACTION1_CLIENT_SECRET" \
            | jq -r '.access_token')
            
          # 2. Query EU cluster endpoints utilizing your Org ID
          STATUS_DATA=$(curl -s -X GET "https://app.eu.action1.com/api/3.0/endpoints/managed/$ACTION1_ORG_ID?fields=*" \
            -H "Authorization: Bearer $TOKEN")

          # 3. Check if the status field equals "connected"
          IS_ONLINE=$(echo "$STATUS_DATA" | jq --arg name "$ENDPOINT_NAME" 'if .items then (.items[] | select(.name==$name) | .status == "connected") else false end')

          # 4. Fallback in case endpoint wasn't found or evaluation returned null
          if [ "$IS_ONLINE" = "null" ] || [ -z "$IS_ONLINE" ]; then
            IS_ONLINE=false
          fi

          # 5. Write out the clean JSON file for your HTML page
          echo "{\"endpoint\": \"$ENDPOINT_NAME\", \"online\": $IS_ONLINE, \"updated_at\": \"$(date -u -Iseconds)\"}" > status.json

      - name: Commit and Push if status changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          
          # Safely check if status.json changed without throwing a terminal error
          CHANGES=$(git status --porcelain status.json)
          
          if [ -n "$CHANGES" ]; then
            git commit -m "Automated status update"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to status.json. Skipping push."
          fi
