name: Check Action1 Endpoint Status

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Endpoint Status from Action1
        env:
          ACTION1_CLIENT_ID: ${{ secrets.ACTION1_CLIENT_ID }}
          ACTION1_CLIENT_SECRET: ${{ secrets.ACTION1_CLIENT_SECRET }}
          ENDPOINT_NAME: "CPE-Control-PC" # Change this to your endpoint's name
        run: |
          # 1. Authenticate and get OAuth token
          TOKEN=$(curl -s -X POST "https://api.action1.com/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$ACTION1_CLIENT_ID&client_secret=$ACTION1_CLIENT_SECRET" \
            | jq -r '.access_token')

          # 2. Query Action1 endpoints (Adjust API URL route based on Action1 API docs)
          # This example queries the endpoints list and filters by your target endpoint name
          STATUS_DATA=$(curl -s -X GET "https://api.action1.com/v1/endpoints" \
            -H "Authorization: Bearer $TOKEN")

          # 3. Use jq to isolate the online/offline status of your specific machine
          # Assumes the JSON response has an 'is_online' or 'status' boolean field
          IS_ONLINE=$(echo "$STATUS_DATA" | jq --arg name "$ENDPOINT_NAME" '.items[] | select(.name==$name) | .is_online')

          # 4. Fallback in case endpoint wasn't found
          if [ "$IS_ONLINE" = "null" ] || [ -z "$IS_ONLINE" ]; then
            IS_ONLINE=false
          fi

          # 5. Write out the clean JSON file for your HTML page
          echo "{\"endpoint\": \"$ENDPOINT_NAME\", \"online\": $IS_ONLINE, \"updated_at\": \"$(date -u -Iseconds)\"}" > status.json

      - name: Commit and Push if status changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff-index --quiet HEAD || git commit -m "Automated status update"
          git push